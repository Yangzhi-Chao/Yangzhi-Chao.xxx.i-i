<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>购物车</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="nav">
  <a href="index.html">首页</a>
  <a href="product.html">产品展示</a>
  <a href="cart.html">购物车</a>
  <a href="about.html">关于我</a>
  <a href="order.html">我的订单</a>
  <a href="msg.html">我的留言</a>
  <a href="admin.html">管理员后台</a>
  <a href="login.html">登录/注册</a>
</div>

<div class="container">
  <h2>购物车</h2>
  <div id="cartList"></div>
  <div class="total" id="total"></div>
  <button class="btn" onclick="goPay()">去付款</button>
  <button class="btn" onclick="submitOrder()">提交订单</button>
  <button class="btn" onclick="clearCart()">清空购物车</button>
</div>
<!-- 自定义收货地址弹窗 -->
<div id="addressModal" style="display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.5);justify-content:center;align-items:center;z-index:9999;">
  <div style="background:white;padding:20px;border-radius:8px;width:80%;max-width:400px;">
    <h3 style="margin-top:0;">请输入收货地址</h3>
    <input type="text" id="addressInput" placeholder="请输入详细地址" style="width:100%;padding:8px;margin:10px 0;border:1px solid #ddd;border-radius:4px;">
    <div style="text-align:right;margin-top:15px;">
      <button class="btn" onclick="confirmAddress()" style="padding:5px 15px;margin-left:10px;">确定</button>
      <button class="btn" onclick="cancelAddress()" style="padding:5px 15px;background:#999;">取消</button>
    </div>
  </div>
</div>

<script>
function renderCart(){
  let cart=JSON.parse(localStorage.getItem('cart')||'[]')
  let list=document.getElementById('cartList')
  let total=document.getElementById('total')
  if(cart.length==0){list.innerHTML='购物车为空';total.innerText='';return}
  let html=''
  let sum=0
  cart.forEach(i=>{
    let subtotal=i.price*i.quantity
    sum+=subtotal
    html+=`<div class="cart-item">
${i.name} 
<button onclick="changeNum('${i.name}',-1)">-</button>
${i.quantity}
<button onclick="changeNum('${i.name}',1)">+</button>
单价¥${i.price} 小计¥${subtotal.toFixed(2)} 
<button onclick="removeItem('${i.name}')" style="margin-left:10px;color:red;">删除</button>
</div>`
  })
  list.innerHTML=html
  total.innerText=`总计：¥${sum.toFixed(2)}`
}
// 购物车数量加减核心函数（新增！）
function changeNum(name, num) {
  let cart = JSON.parse(localStorage.getItem('cart') || '[]')
  let item = cart.find(i => i.name == name)
  if (!item) return
  // 保证数量最少为1，不会减到0
  item.quantity = Math.max(1, item.quantity + num)
  localStorage.setItem('cart', JSON.stringify(cart))
  renderCart() // 改完数量后刷新购物车
}
function clearCart(){localStorage.removeItem('cart');renderCart()}
// 第一步：点击提交订单 → 显示自定义中文弹窗
function submitOrder(){
  let user = JSON.parse(localStorage.getItem('currentUser'));
  if(!user){
    alert('请先登录后再提交订单！');
    location.href = 'login.html';
    return;
  }
  let cart=JSON.parse(localStorage.getItem('cart')||'[]')
  if(cart.length==0){
    alert('购物车为空');
    return;
  }
  // 显示自定义弹窗（核心！你之前漏了这行）
  document.getElementById('addressModal').style.display = 'flex';
}

// 第二步：点击弹窗「确定」→ 提交订单
function confirmAddress(){
  // 获取输入的地址（核心！你之前没定义address变量）
  let address = document.getElementById('addressInput').value;
  if(!address){
    alert('请输入收货地址！');
    return;
  }

  let user = JSON.parse(localStorage.getItem('currentUser'));
  let cart=JSON.parse(localStorage.getItem('cart')||'[]')
  let order = {
    name: user.name,
    phone: user.phone,
    address: address, // 现在address变量有值了
    items: cart,
    time: new Date().toLocaleString(),
    total: cart.reduce((sum, item) => sum + item.price * item.quantity, 0)
  };

  let orders = JSON.parse(localStorage.getItem('orders') || '[]');
  orders.push(order);
  localStorage.setItem('orders', JSON.stringify(orders));
  localStorage.removeItem('cart');
  alert('订单提交成功！');
  
  // 关闭弹窗 + 清空输入框
  document.getElementById('addressModal').style.display = 'none';
  document.getElementById('addressInput').value = '';
  location.href = 'order.html';
}

// 第三步：点击弹窗「取消」→ 关闭弹窗
function cancelAddress(){
  document.getElementById('addressModal').style.display = 'none';
  document.getElementById('addressInput').value = '';
}

// 删除购物车商品
function removeItem(name) {
  let cart = JSON.parse(localStorage.getItem('cart') || '[]')
  cart = cart.filter(item => item.name !== name)
  localStorage.setItem('cart', JSON.stringify(cart))
  renderCart()
}
function goPay(){
  let cart=JSON.parse(localStorage.getItem('cart')||'[]')
  if(cart.length==0){alert('购物车为空！');return}
  let total=cart.reduce((s,i)=>s+i.price*i.quantity,0)
  alert('请扫码支付：¥'+total.toFixed(2))
  window.open('pay.jpg','_blank')
}
// 页面加载时渲染购物车
window.onload = renderCart;
</script>
</body>
</html>
