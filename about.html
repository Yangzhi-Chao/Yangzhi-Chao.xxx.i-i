  <h2>关于我</h2>

  <p>电话：13774419938</p>
  <p>地址：云南省广南县珠琳镇阿卡黑</p>

  <div class="contact">
    <h3>留言咨询</h3>
    <input type="text" id="name" placeholder="你的姓名">
    <input type="text" id="phone" placeholder="你的电话">
    <textarea rows="4" id="content" placeholder="留言内容"></textarea>
    <button class="btn" onclick="sendMsg()">提交留言</button>
  </div>
</div>

<script>
function sendMsg(){
  let name=document.getElementById('name').value
  let phone=document.getElementById('phone').value
  let content=document.getElementById('content').value
  if(!name||!phone||!content){alert('请填写完整');return}
  let msg={name,phone,content,time:new Date().toLocaleString()}
  let msgs=JSON.parse(localStorage.getItem('msgs')||'[]')
  msgs.push(msg)
  localStorage.setItem('msgs',JSON.stringify(msgs))
  alert('留言成功！')
  document.getElementById('name').value=''
  document.getElementById('phone').value=''
  document.getElementById('content').value=''
}
</script>
