<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户注册</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="nav">
  <a href="index.html">首页</a>
  <a href="product.html">产品展示</a>
  <a href="cart.html">购物车</a>
  <a href="about.html">关于我</a>
  <a href="order.html">我的订单</a>
  <a href="msg.html">我的留言</a>
  <a href="admin.html">管理员后台</a>
  <a href="login.html">登录/注册</a>
</div>

<div class="container">
  <h2>用户注册</h2>
  <div class="contact">
    <input type="text" id="regName" placeholder="请输入姓名">
    <input type="text" id="regPhone" placeholder="请输入手机号">
    <input type="password" id="regPwd" placeholder="请输入密码">
    <button class="btn" onclick="register()">注册</button>
    <p>已有账号？<a href="login.html">去登录</a></p>
  </div>
</div>

<script>
function register(){
  let name = document.getElementById('regName').value;
  let phone = document.getElementById('regPhone').value;
  let pwd = document.getElementById('regPwd').value;
  
  if(!name || !phone || !pwd){
    alert('请填写完整');
    return;
  }
  
  let users = JSON.parse(localStorage.getItem('users') || '[]');
  let exists = users.find(u => u.phone === phone);
  
  if(exists){
    alert('该手机号已注册！');
    return;
  }
  
  users.push({name, phone, pwd});
  localStorage.setItem('users', JSON.stringify(users));
  alert('注册成功！请登录');
  location.href = 'login.html';
}
</script>

</body>
</html>
