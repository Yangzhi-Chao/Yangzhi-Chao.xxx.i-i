<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理员后台</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="nav">
  <a href="index.html">首页</a>
  <a href="product.html">产品展示</a>
  <a href="cart.html">购物车</a>
  <a href="about.html">关于我</a>
  <a href="order.html">我的订单</a>
  <a href="msg.html">我的留言</a>
  <a href="admin.html">管理员后台</a>
  <a href="admin.html">管理员后台</a>
</div>

<div class="container">
  <h2>管理员后台</h2>

  <button class="btn" onclick="showAllOrders()">查看所有订单</button>
  <button class="btn" onclick="showAllMsgs()">查看所有留言</button>
  <button class="btn" onclick="clearAllData()" style="background:#999;">清空所有数据（谨慎）</button>

  <hr>
  <div id="adminContent"></div>
</div>

<script>
// 先验证密码
function checkAdmin(){
  let pwd = prompt("请输入管理员密码：");
  // 密码你自己改，比如 666888、123456 都行
  if(pwd !== "123456"){
    alert("密码错误！");
    return false;
  }
  return true;
}

// ================== 查看所有订单 ==================
function showAllOrders(){
  if(!checkAdmin()) return;

  let orders = JSON.parse(localStorage.getItem("orders") || []);
  let html = "<h3>全部订单</h3>";

  if(orders.length === 0){
    html += "暂无订单";
  } else {
    orders.forEach((o,i)=>{
      let total = o.items.reduce((sum,item)=>sum + item.price*item.quantity, 0);
      let itemsHtml = o.items.map(item=>
        `<div>→ ${item.name} ×${item.quantity} 单价${item.price} 小计${(item.price*item.quantity).toFixed(2)}</div>`
      ).join('');

      html += `
        <div class="order">
          <div>订单 ${i+1}</div>
          <div>姓名：${o.name}</div>
          <div>电话：${o.phone}</div>
          <div>地址：${o.address}</div>
          <div>时间：${o.time}</div>
          <div>商品：${itemsHtml}</div>
          <div><strong>总价：¥${total.toFixed(2)}</strong></div>
          <button onclick="delOrder(${i})" style="background:red;color:white;padding:5px;margin-top:5px;">删除此订单</button>
        </div><hr>
      `;
    });
  }
  document.getElementById("adminContent").innerHTML = html;
}

// 删除订单
function delOrder(index){
  if(!confirm("确定删除此订单？")) return;
  let orders = JSON.parse(localStorage.getItem("orders") || []);
  orders.splice(index, 1);
  localStorage.setItem("orders", JSON.stringify(orders));
  showAllOrders();
}

// ================== 查看所有留言 ==================
function showAllMsgs(){
  if(!checkAdmin()) return;

  let msgs = JSON.parse(localStorage.getItem("msgs") || []);
  let html = "<h3>全部留言</h3>";

  if(msgs.length === 0){
    html += "暂无留言";
  } else {
    msgs.forEach((m,i)=>{
      html += `
        <div class="msg">
          <div>留言 ${i+1}</div>
          <div>姓名：${m.name}</div>
          <div>电话：${m.phone}</div>
          <div>内容：${m.content}</div>
          <div>时间：${m.time}</div>
          <button onclick="delMsg(${i})" style="background:red;color:white;padding:5px;margin-top:5px;">删除此留言</button>
        </div><hr>
      `;
    });
  }
  document.getElementById("adminContent").innerHTML = html;
}

// 删除留言
function delMsg(index){
  if(!confirm("确定删除此留言？")) return;
  let msgs = JSON.parse(localStorage.getItem("msgs") || []);
  msgs.splice(index, 1);
  localStorage.setItem("msgs", JSON.stringify(msgs));
  showAllMsgs();
}

// ================== 清空所有数据 ==================
function clearAllData(){
  if(!checkAdmin()) return;
  if(!confirm("确定清空【订单、留言、购物车】所有数据？")) return;
  localStorage.clear();
  alert("已清空所有数据！");
  location.reload();
}
</script>

</body>
</html>
