<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>用户登录</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="nav">
  <a href="index.html">首页</a>
  <a href="product.html">产品展示</a>
  <a href="cart.html">购物车</a>
  <a href="about.html">关于我</a>
  <a href="order.html">我的订单</a>
  <a href="msg.html">我的留言</a>
  <a href="admin.html">管理员后台</a>
  <a href="login.html">登录/注册</a>
</div>

<div class="container">
  <h2>用户登录</h2>
  <div class="contact">
    <input type="text" id="loginPhone" placeholder="请输入手机号">
    <input type="password" id="loginPwd" placeholder="请输入密码">
    <button class="btn" onclick="login()">登录</button>
    <p>还没账号？<a href="register.html">去注册</a></p>
  </div>
</div>

<script>
function login(){
  let phone = document.getElementById('loginPhone').value;
  let pwd = document.getElementById('loginPwd').value;
  
  if(!phone || !pwd){
    alert('请填写完整');
    return;
  }
  
  let users = JSON.parse(localStorage.getItem('users') || '[]');
  let user = users.find(u => u.phone === phone && u.pwd === pwd);
  
  if(user){
    localStorage.setItem('currentUser', JSON.stringify(user));
    alert('登录成功！');
    location.href = 'index.html';
  }else{
    alert('手机号或密码错误！');
  }
}
</script>

</body>
</html>
