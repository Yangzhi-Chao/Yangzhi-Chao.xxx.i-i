<div class="lightbox" id="lightbox" onclick="closeLightbox()">
  <img src="" id="lightbox-img">
</div>

<script>
function show(id){
  document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'))
  document.getElementById(id).classList.add('active')
}
function openLightbox(src){
  document.getElementById('lightbox').style.display='flex'
  document.getElementById('lightbox-img').src=src
}
function closeLightbox(){
  document.getElementById('lightbox').style.display='none'
}
function add(name,price){
  let cart=JSON.parse(localStorage.getItem('cart')||'[]')
  let item=cart.find(i=>i.name==name)
  if(item)item.quantity++
  else cart.push({name,price,quantity:1})
  localStorage.setItem('cart',JSON.stringify(cart))
  alert('已加入购物车：'+name)
}
// 全局存储每个商品的选择数量
let productNums = {};

// 修改商品数量（淘宝加减逻辑）
function changeProductNum(name, num) {
  // 初始化数量为1
  if (!productNums[name]) productNums[name] = 1;
  // 加减数量，最少保留1件
  productNums[name] += num;
  if (productNums[name] < 1) productNums[name] = 1;
  // 更新页面显示的数字
  document.getElementById('num-' + name).innerText = productNums[name];
}

// 按选择的数量加入购物车（替换原来的add函数逻辑）
function addWithNum(name, price) {
  let num = productNums[name] || 1;
  let cart = JSON.parse(localStorage.getItem('cart') || '[]');
  let item = cart.find(i => i.name === name);
  
  if (item) {
    item.quantity += num; // 已有商品，数量累加
  } else {
    cart.push({ name, price, quantity: num }); // 新商品，用选择的数量
  }
  
  localStorage.setItem('cart', JSON.stringify(cart));
  alert(`已加入 ${num} 件「${name}」到购物车`);
  // 加入后重置数量为1，方便下次选择
  productNums[name] = 1;
  document.getElementById('num-' + name).innerText = 1;
}
// 跳转到详情页
function goDetail(name, price, src) {
  let str = JSON.stringify({name, price, src})
  location.href = 'detail.html?' + encodeURIComponent(str)
}
</script>
