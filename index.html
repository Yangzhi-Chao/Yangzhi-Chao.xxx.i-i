<script>// 页面加载时检查登录状态
window.onload = function() {
  let user = JSON.parse(localStorage.getItem('currentUser'));
  let userInfo = document.getElementById('userInfo');
  
  if(user) {
    userInfo.innerHTML = `欢迎你，${user.name}！<button class="btn" onclick="logout()" style="padding:5px 10px;margin-left:10px;">退出登录</button>`;
  } else {
    userInfo.innerHTML = '请先<a href="login.html">登录</a>后再下单或留言';
  }
  // 轮播图自动播放
let sliderWrap = document.querySelector('.slider-wrap');
let slides = document.querySelectorAll('.slide');
let current = 0;
let count = 4; // 4张图
 // 手动控制轮播
  function prevSlide() {
    current--;
    if(current < 0) current = count - 1;
    updateSlide();
  }
  function nextSlide() {
    current++;
    if(current >= count) current = 0;
    updateSlide();
  }
  function goSlide(index) {
    current = index;
    updateSlide();
  }
  function updateSlide() {
    sliderWrap.style.transform = `translateX(-${current * 100}%)`;
    // 更新指示器激活状态
    document.querySelectorAll('.dot').forEach((dot, i) => {
      dot.classList.toggle('active', i === current);
    });
  }

  // 自动轮播（2.5秒切换一次）
  setInterval(() => {
    nextSlide();
  }, 2500);
}


// 退出登录
function logout() {
  localStorage.removeItem('currentUser');
  location.reload();
}
</script>
